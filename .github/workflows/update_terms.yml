name: Update T&C Database

on:
  schedule:
    # Se ejecuta todos los domingos a medianoche
    - cron: '0 0 * * 0'
  workflow_dispatch: # Permite ejecutarlo manualmente para probar

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt

      - name: Run Update Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.Secrets.GEMINI_API_KEY }}
        run: python scripts/update_terms.py